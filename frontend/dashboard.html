<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sophie | Cloud Security Engineer ☁️</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css?v=5">
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

<main style="padding: 2rem;">

  <h1></h1>

 

</main>


<section class="architecture-preview">

  <div class="architecture-card">

    <h2>Security Dashboard</h2>    

    <div class="architecture-tags">
      <p>
       <div style="text-align: left;"><button onclick="loadEvents()">Load Events</button>

        <ul id="events"></ul>
        </div>
    </p>
  </div>
</div>

</section>
  <!-- FOOTER -->
  <div id="footer"></div>

  <script>

    // Load security events
async function loadEvents() {

  const res = await fetch(
    "https://za4ajp5sa6.execute-api.us-east-1.amazonaws.com/security-events"
  );

  const data = await res.json();

  const list = document.getElementById("events");

  list.innerHTML = "";

  data.forEach(event => {

    const li = document.createElement("li");

    // Normalize user agent
    const ua = (event.userAgent || "").toLowerCase();

    // Default risk
    let risk = "Low";
    let color = "#22c55e";

    // Medium risk checks
    if (
      ua.includes("bot") ||
      ua.includes("crawler") ||
      ua.includes("spider")
    ) {
      risk = "Medium";
      color = "#f59e0b";
    }

    // High risk checks
    if (
      ua.includes("curl") ||
      ua.includes("python") ||
      ua.includes("sqlmap") ||
      ua.includes("nikto") ||
      ua.includes("nmap")
    ) {
      risk = "High";
      color = "#ef4444";
    }

    // Style each event row
    li.style.padding = "12px";
    li.style.marginBottom = "10px";
    li.style.borderRadius = "12px";
    li.style.background = "rgba(15,23,42,0.7)";
    li.style.border = "1px solid rgba(148,163,184,0.15)";
    li.style.fontFamily = "monospace";
    li.style.color = "#e2e8f0";

    // Render HTML
    li.innerHTML = `
      <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">

        <span>
          ${event.timestamp}
        </span>

        <span style="color:#38bdf8;">
          ${event.userAgent}
        </span>

        <span style="
          color:${color};
          font-weight:bold;
        ">
          ${risk} Risk
        </span>

      </div>
    `;

    list.appendChild(li);

  });
}

    // Load Header
    fetch('/components/header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;
      });

    // Load Footer
    fetch('/components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      });

  </script>

</body>

</html>
